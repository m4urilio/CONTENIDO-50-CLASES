<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>50 Lecciones de Canto</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>50 Lecciones de Canto</h1>
      <p>Marca tu progreso a medida que avanzas</p>
    </header>

    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 50 clases completadas (0%)</span>
    </div>

    <div class="toolbar">
      <button id="reset-btn">Reiniciar progreso</button>
    </div>

    <main>
      <div class="classes-grid" id="classes-grid"></div>
    </main>

    <!-- CONFIRM RESET POPUP -->
    <div class="modal-overlay" id="confirm-overlay">
      <div class="modal-box confirm-box">
        <div class="confirm-icon">&#9888;</div>
        <h3 class="confirm-title">¿Reiniciar progreso?</h3>
        <p class="confirm-msg">Se borrarán todas las clases marcadas como completadas. Esta acción no se puede deshacer.</p>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirm-cancel">Cancelar</button>
          <button class="confirm-ok" id="confirm-ok">Sí, reiniciar</button>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal-box">
        <button class="modal-close" id="modal-close" title="Cerrar">&times;</button>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
