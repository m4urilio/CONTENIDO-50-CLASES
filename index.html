<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contenido 50 Clases</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Contenido — 50 Clases</h1>
      <p>Marca tu progreso a medida que avanzas</p>
    </header>

    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 50 clases completadas (0%)</span>
    </div>

    <div class="toolbar">
      <button id="reset-btn">Reiniciar progreso</button>
    </div>

    <main>
      <div class="classes-grid" id="classes-grid"></div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
